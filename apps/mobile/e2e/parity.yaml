appId: com.climbset.app
---
- clearState
- launchApp
- waitForAnimationToEnd
- assertVisible: "ClimbSet"
- tapOn:
    id: "profile-tab"
- waitForAnimationToEnd
- assertVisible:
    id: "profile-screen"
- assertVisible: "Profile"
- assertVisible:
    id: "open-settings-button"
- tapOn:
    id: "open-settings-button"
- waitForAnimationToEnd
- assertVisible:
    id: "settings-screen"
- assertVisible: "Settings"
- assertVisible: "Appearance"
- tapOn: "Dark"
- assertVisible:
    id: "settings-screen"
- scrollUntilVisible:
    element: "Storage history"
    direction: DOWN
- assertVisible: "Storage history"
- back
- tapOn:
    id: "routes-tab"
- waitForAnimationToEnd
- assertVisible: "ClimbSet"
- tapOn: "Search routes, setters..."
- inputText: "zzzz-no-route"
- pressKey: Enter
- assertVisible: "No routes found"
- tapOn:
    id: "empty-clear-filters"
- waitForAnimationToEnd
- assertNotVisible: "No routes found"
- assertVisible: "Create route"
- tapOn:
    id: "create-route-fab"
- waitForAnimationToEnd
- assertVisible: "Undo"
- tapOn:
    point: "50%, 55%"
- assertVisible: "1 hold"
- tapOn: "Undo"
- assertVisible: "0 holds"
- tapOn: "Redo"
- assertVisible: "1 hold"
- tapOn: "Save route"
- assertVisible: "Save route"
- assertVisible: "Route name"
- takeScreenshot: e2e-editor-save
